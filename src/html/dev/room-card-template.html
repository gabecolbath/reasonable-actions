<div id="room-card-{{{room_urn}}}" class="room-card">
    <div class="room-info"
        hx-trigger="click"
        hx-get="rooms/join/form"
        hx-swap="outerHTML"
        hx-vals='{ "room-urn": "{{{room_urn}}}" }'>

        <div class="room-card-logo"></div>

        <div class="room-card-name">{{{host_name}}}</div>

        <div class="room-card-members">
            <i class="bi bi-person-fill"></i>
            {{{member_count}}}/{{{member_capacity}}}
        </div>

        <div class="room-card-availability">
            {{#is_private}}<i class="bi bi-lock-fill"></i>{{/is_private}}
            {{^is_private}}<i class="bi bi-unlock-fill"></i>{{/is_private}}
        </div>

    </div>
</div>
