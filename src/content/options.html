<div id="rounds-option-container"
    hx-swap-oob="outerHTML">
    <label for="#rounds-option-input">Rounds</label>
    <input id="rounds-option-input"
        name="rounds_option"
        type="number"
        value="{{rounds_option_default_value}}">
</div>

<div id="categories-per-round-option-container"
    hx-swap-oob="outerHTML">
    <label for="#categories-per-round-option-input">Categories</label>
    <input id="categories-per-round-option-input"
        name="categories_per_round_option"
        type="number"
        value="{{categories_per_round_option_default_value}}">
</div>

<div id="repeat-categories-option-container"
    hx-swap-oob="outerHTML">
    <label for="#repeat-categories-option-input">Repeat Categories</label>
    <input id="repeat-categories-option-input"
        name="repeat_categories_option"
        type="checkbox"
        checked="{{repeat_categories_option_default_value}}">
</div>

<div id="answering-time-limit-option-container"
    hx-swap-oob="outerHTML">
    <label for="#answering-time-limit-option-input">Answering Time Limit [s]</label>
    <input id="answering-time-limit-option-input"
        name="answering_time_limit_option"
        type="number"
        value="{{answering_time_limit_option_default_value}}">
</div>

<div id="voting-time-limit-option-container"
    hx-swap-oob="outerHTML">
    <label for="#enable-voting-time-limit-option-input">Voting Time Limit [s]</label>
    <input id="enable-voting-time-limit-option-input"
        name="enable_voting_time_limit_option"
        type="checkbox"
        checked="{{enable_voting_time_limit_option_default_value}}">
    <input id="voting-time-limit-option-input"
        name="voting_time_limit_option"
        type="number"
        value="{{voting_time_limit_option_default_value}}">
</div>

<div id="alliteration-points-option-container"
    hx-swap-oob="outerHTML">
    <label for="#alliteration-points-option-input">Alliteration Points</label>
    <input id="alliteration-points-option-input"
        name="alliteration_points_option"
        type="checkbox"
        checked="{{alliteration_points_option_default_value}}">
</div>

<div id="scoring-mode-option-container"
    hx-swap-oob="outerHTML">
    <label for="#scoring-mode-option-select">Scoring Mode</label>
    <select id="#scoring-mode-option-select"
        name="scoring_mode_option">
        <option value="normal" {{scoring_mode_option_normal_selected}}>Normal</option>
        <option value="creative" {{scoring_mode_option_creative_selected}}>Creative</option>
    </select>
</div>

<div id="weighted-scores-option-container"
    hx-swap-oob="outerHTML">
    <label for="weighted-scores-option-input">Weighted Scores</label>
    <input id="weighted-scores-option-input"
        name="weighted_scores_option"
        type="checkbox"
        checked="{{weighted_scores_option_default_value}}">
</div>
