<div id="game"
    <div id="lobby">
        <div id="options"
            hx-get="/games/scatty/lobby/default-options"
            hx-trigger="load"
            hx-target="#options"
            hx-swap="outerHTML">
        </div>
    </div>
</div>

<div id="player-list"
    hx-swap-oob="outerHTML"
    hx-get="/games/scatty/player-list/{{room_urn}}"
    hx-trigger="load">
</div>

<div id="room-info"
    hx-swap hx-swap-oob="outerHTML">
    Room Infosies Here!!
</div>
