<div id="game" hx-swap-oob="outerHTML:#game">
    <div id="game-lobby">
        <fieldset>
            <legend>Options</legend>

            <div id="game-options">
                <label class="opt-label" for="#opt-round">Rounds</label>
                <input id="opt-round"
                class="opt-number" 
                name="round" 
                type="number"
                form="options" 
                value="{{{opt.round}}}"
                {{^is_host}}disabled{{/is_host}}>

                <fieldset>
                    <legend>Categories</legend>

                    <label class="opt-label" for="#opt-categories-per-round">Per Round</label>
                    <input id="opt-categories-per-round"
                    class="opt-number" 
                    name="categories-per-round" 
                    form="options" 
                    type="number" 
                    value="{{{opt.categories_per_round}}}"
                    {{^is_host}}disabled{{/is_host}}>

                    <label class="opt-label" for="#opt-repeat-categories">Repeat</label>
                    <input id="opt-repeat-categories"
                    class="opt-checkbox"
                    name="repeat-categories"
                    type="checkbox"
                    form="options"
                    {{#opt.repeat_categories}}checked{{/opt.repeat_categories}}}
                    {{^is_host}}disabled{{/is_host}}>
                </fieldset>

                <fieldset>
                    <legend>Time Limits (s)</legend>

                    <label class="opt-label" for="#opt-answering-time-limit">Answering</label>
                    <input id="opt-answering-time-limit"
                    class="opt-number"
                    name="answering-time-limit"
                    type="number"
                    form="options"
                    value="{{{opt.answering_time_limit}}}"
                    {{^is_host}}disabled{{/is_host}}>

                    <label class="opt-label" for="#opt-voting-time-limit">Voting</label>
                    <input id="opt-voting-time-limit"
                    class="opt-text"
                    name="voting-time-limit"
                    type="number"
                    form="options"
                    value="{{{opt.voting_time_limit}}}"
                    {{^is_host}}disabled{{/is_host}}>
                </fieldset>

                <fieldset>
                    <legend>Scoring</legend>
                    <label class="opt-label" for="#opt-alliteration-points">Bonus Points</label>
                    <input id="opt-alliteration-points"
                    class="opt-checkbox"
                    name="alliteration-points"
                    type="checkbox"
                    form ="options"
                    {{#opt.alliteration_points}}checked{{/opt.alliteration_points}}
                    {{^is_host}}disabled{{/is_host}}>

                    <label class="opt-label" for="#opt-weighted-scores">Weighted by Vote</label>
                    <input id="opt-weighted-scores"
                    class="opt-checkbox"
                    name="weighted-scores"
                    type="checkbox"
                    form="options"
                    {{#opt.weighted_scores}}checked{{/opt.weighted_scores}}
                    {{^is_host}}disabled{{/is_host}}>
                </fieldset>

                <fieldset>
                    <legend>Voting</legend>

                    <label class="opt-label" for="#opt-show-names">Show Names</label>
                    <input id="opt-show-names"
                    class="opt-checkbox"
                    name="show-names"
                    type="checkbox"
                    form="options"
                    {{#opt.show_names}}checked{{/opt.show_names}}
                    {{^is_host}}disabled{{/is_host}}>
                </fieldset>
            </div>
        </fieldset>

        <button id="start-game-button" {{^is_host}}disabled{{/is_host}}>Start</button>
</div>

</div>
